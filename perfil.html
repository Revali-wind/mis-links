<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | revali</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <div class="background-wrapper">
        <div class="profile-card">
            
            <div class="image-wrapper">
                <img src="perfil.jpeg" alt="Foto de perfil de revali" class="profile-img">
            </div>

            <h1 class="profile-name">revali</h1>
            <!-- Títulos profesionales -->
            <p class="profile-tags">Analista de Datos | Automatización | Machine Learning</p>
            
<!-- SECCIÓN GAMER -->
            <div class="gamer-section">
                <div class="gamer-tag">
                    <i class="fas fa-khanda"></i> <!-- Un icono de espadas cruzadas para el toque RPG/Aventura -->
                    <span>The Legend of Zelda, Octopath Traveler & RPGs</span>
                </div>
            </div>

            <!-- REDES SOCIALES (GitHub, Instagram, Steam) -->
            <div class="social-links">
                <a href="https://github.com/Revali-wind" target="_blank" class="social-btn github">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.instagram.com/hombrecalidad/" target="_blank" class="social-btn instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://steamcommunity.com/profiles/76561198175377749/" target="_blank" class="social-btn steam">
                    <i class="fab fa-steam"></i>
                </a>
            </div>

            <!-- SECCIÓN MÚSICA -->
            <div class="music-section">
                <a href="#" target="_blank" class="apple-music-btn" id="music-btn">
                    <i class="fab fa-apple"></i>
                    <span id="song-info">Cargando música...</span>
                </a>
            </div>

    <script src="script.js"></script>
</body>
</html>
